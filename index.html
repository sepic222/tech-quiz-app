<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechUp! — Choose Your Path</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="sticker-field" aria-hidden="true">
    <span class="sticker" style="--x:5%;--y:8%;--s:2.6;--rot:-15deg;--dur:6s;--delay:0s;--glow:rgba(0,255,136,0.5)">⚡</span>
    <span class="sticker" style="--x:80%;--y:5%;--s:2.2;--rot:20deg;--dur:5.5s;--delay:1s;--glow:rgba(155,93,229,0.5)">🌌</span>
    <span class="sticker" style="--x:2%;--y:55%;--s:1.8;--rot:12deg;--dur:7s;--delay:0.5s;--glow:rgba(0,200,255,0.4)">🧠</span>
    <span class="sticker" style="--x:88%;--y:42%;--s:2;--rot:-8deg;--dur:6.5s;--delay:1.8s;--glow:rgba(255,230,0,0.5)">💡</span>
    <span class="sticker" style="--x:75%;--y:75%;--s:2.4;--rot:18deg;--dur:5s;--delay:0.3s;--glow:rgba(255,45,120,0.4)">🔥</span>
    <span class="sticker" style="--x:8%;--y:80%;--s:1.6;--rot:-22deg;--dur:6.8s;--delay:2.2s;--glow:rgba(0,255,136,0.35)">🚀</span>
    <span class="sticker" style="--x:42%;--y:3%;--s:1.5;--rot:5deg;--dur:7.5s;--delay:1.4s;--glow:rgba(255,107,0,0.4)">🎯</span>
    <span class="sticker" style="--x:90%;--y:18%;--s:1.7;--rot:-12deg;--dur:5.8s;--delay:0.8s;--glow:rgba(0,255,212,0.4)">✨</span>
    <span class="sticker" style="--x:55%;--y:88%;--s:2;--rot:10deg;--dur:6.2s;--delay:2.6s;--glow:rgba(155,93,229,0.35)">💎</span>
    <span class="sticker" style="--x:20%;--y:92%;--s:1.4;--rot:-6deg;--dur:5.3s;--delay:0.9s;--glow:rgba(255,230,0,0.3)">⭐</span>
  </div>

  <div id="app" class="landing-app">

    <div class="logo">
      <span class="logo-icon">&#9889;</span>
      <h1>TechUp!</h1>
      <p class="tagline">Level up your tech &amp; business vocabulary</p>
    </div>

    <p class="landing-question">Who are you today?</p>

    <div class="path-cards">

      <a href="quiz.html" class="path-card padawan">
        <span class="path-emoji">🎓</span>
        <span class="path-title">Padawan</span>
        <span class="path-sub">I'm here to learn</span>
        <span class="path-cta">Start Quiz →</span>
      </a>

      <a href="contribute.html" class="path-card yoda">
        <span class="path-emoji">🧙</span>
        <span class="path-title">Yoda</span>
        <span class="path-sub">I want to challenge others</span>
        <span class="path-cta">Add a Term →</span>
      </a>

    </div>

    <button class="voice-welcome-btn" id="voice-btn">🔊 Hear your mission</button>

  </div>

  <script>
    document.getElementById('voice-btn').addEventListener('click', function () {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      var utter = new SpeechSynthesisUtterance(
        'TechUp! Choose your path. Are you a Padawan, here to learn? ' +
        'Or are you Yoda — wise enough to challenge others?'
      );
      utter.rate = 0.88;
      utter.pitch = 1;
      window.speechSynthesis.speak(utter);
    });
  </script>

</body>
</html>
